services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env.dev}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env.dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER must be set in .env.dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    entrypoint: ["/app/infra/entrypoint.sh"]
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - /opt/saasmint/.env.dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_DB:?POSTGRES_DB must be set in .env.dev}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.dev}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set in .env.dev}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: uv run celery -A config.celery worker -B --loglevel=info
    env_file:
      - /opt/saasmint/.env.dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_DB:?POSTGRES_DB must be set in .env.dev}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.dev}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set in .env.dev}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
