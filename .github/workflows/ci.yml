name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint (Ruff) ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Lint core
        working-directory: core
        run: uv sync --extra dev && uv run ruff check .

      - name: Lint django
        run: uv sync --extra dev --no-install-project && uv run ruff check .

  # ─── Typecheck ─────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Typecheck django
        run: uv sync --extra dev --no-install-project && uv run mypy .

      - name: Typecheck core
        working-directory: core
        run: uv sync --extra dev && uv run mypy .

  # ─── Test (core) ───────────────────────────────────────────────────────────────
  test-core:
    name: Test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests
        working-directory: core
        run: uv sync --extra dev && uv run pytest -v

  # ─── Test (django) ─────────────────────────────────────────────────────────────
  test-django:
    name: Test (django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stripe_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stripe_saas_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests
        run: |
          uv sync --extra dev --no-install-project
          uv run pytest -v || {
            code=$?
            if [ $code -eq 5 ]; then echo "⚠ Skipped — no tests found yet"; exit 0; fi
            exit $code
          }

  # ─── Vulnerability audit ──────────────────────────────────────────────────────
  audit:
    name: Audit — ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: django
            dir: .
          - pkg: core
            dir: core
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: uv sync --extra dev --no-install-project 2>/dev/null || uv sync --extra dev

      - name: Run pip-audit
        working-directory: ${{ matrix.dir }}
        run: |
          uv run pip-audit --desc --skip-editable -f json -o /tmp/audit-raw.json || true
          # Build a markdown report from JSON output
          python3 -c "
          import json, sys
          data = json.load(open('/tmp/audit-raw.json'))
          vulns = data.get('dependencies', [])
          rows = []
          for dep in vulns:
              for v in dep.get('vulns', []):
                  fix = v.get('fix_versions', [])
                  fix_str = ', '.join(fix) if fix else 'None'
                  rows.append(f'| {dep[\"name\"]} | {dep[\"version\"]} | {v[\"id\"]} | {fix_str} | {v.get(\"description\", \"\")[:120]} |')
          if rows:
              print('| Package | Version | CVE | Fix | Description |')
              print('|---|---|---|---|---|')
              print('\n'.join(rows))
          else:
              print('no-vulns')
          " > /tmp/audit-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ matrix.pkg }}
          path: /tmp/audit-report.txt
          retention-days: 1

  # ─── Dependency freshness ──────────────────────────────────────────────────────
  check-deps:
    name: Check deps — ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: django
            dir: .
          - pkg: core
            dir: core
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Check for outdated dependencies
        working-directory: ${{ matrix.dir }}
        run: |
          if [ ! -f uv.lock ]; then
            echo "⚠ Skipped — no uv.lock yet"
            echo "up-to-date" > /tmp/deps-report.txt
            exit 0
          fi
          # Extract name=version pairs from a uv.lock file
          extract() {
            awk '/^\[\[package\]\]/{p=1;name=""} p && /^name = /{name=$3} p && /^version = / && name{print name "=" $3; p=0}' "$1" | tr -d '"' | sort
          }
          extract uv.lock > /tmp/current.txt
          uv lock --upgrade -q
          extract uv.lock > /tmp/latest.txt
          # Join on package name and keep rows where version changed
          join -t= /tmp/current.txt /tmp/latest.txt \
            | awk -F= '$2 != $3 { printf "| %s | %s | %s |\n", $1, $2, $3 }' \
            > /tmp/changed.txt || true
          if [ ! -s /tmp/changed.txt ]; then
            echo "All dependencies up to date."
            echo "up-to-date" > /tmp/deps-report.txt
          else
            echo "::warning::Outdated dependencies found in ${{ matrix.pkg }}"
            {
              echo "| Package | Current | Latest |"
              echo "|---|---|---|"
              head -40 /tmp/changed.txt
            } | tee /tmp/deps-report.txt
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deps-report-${{ matrix.pkg }}
          path: /tmp/deps-report.txt
          retention-days: 1

  # ─── Post audit & dependency comment ────────────────────────────────────────
  pr-comment:
    name: Post PR comment
    if: github.event_name == 'pull_request'
    needs: [audit, check-deps]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{audit-report-*,deps-report-*}"
          path: reports

      - name: Build and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          comment=""

          # ── Vulnerability audit section ──
          audit_body=""
          has_vulns=false
          for dir in reports/audit-report-*/; do
            [ -d "$dir" ] || continue
            pkg=$(basename "$dir" | sed 's/audit-report-//')
            report=$(cat "$dir/audit-report.txt")
            if echo "$report" | grep -q "^|"; then
              has_vulns=true
              audit_body="${audit_body}### ${pkg}\n\n${report}\n\n"
            fi
          done
          if [ "$has_vulns" = true ]; then
            comment="## ⚠️ Vulnerability Audit\n\n${audit_body}"
          fi

          # ── Outdated dependencies section ──
          deps_body=""
          has_updates=false
          for dir in reports/deps-report-*/; do
            [ -d "$dir" ] || continue
            pkg=$(basename "$dir" | sed 's/deps-report-//')
            report=$(cat "$dir/deps-report.txt")
            if echo "$report" | grep -q "^|"; then
              has_updates=true
              deps_body="${deps_body}### ${pkg}\n\n${report}\n\n"
            fi
          done
          if [ "$has_updates" = true ]; then
            comment="${comment}## Outdated Dependencies\n\n${deps_body}> Run \`uv lock --upgrade\` to update.\n"
          fi

          # ── Post or clean up ──
          if [ -z "$comment" ]; then
            echo "No audit or dependency issues — no comment needed."
            # Delete stale comment if present
            gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Vulnerability Audit") or contains("Outdated Dependencies"))) | .id' \
              | xargs -I{} gh api -X DELETE "repos/${GH_REPO}/issues/comments/{}" 2>/dev/null || true
            exit 0
          fi

          # Delete previous bot comment on these topics
          gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Vulnerability Audit") or contains("Outdated Dependencies"))) | .id' \
            | xargs -I{} gh api -X DELETE "repos/${GH_REPO}/issues/comments/{}" 2>/dev/null || true
          printf "%b" "$comment" | gh pr comment "$PR_NUMBER" --body-file -
