name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint (Ruff) ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Lint core
        working-directory: core
        run: uv sync --extra dev && uv run ruff check .

      - name: Lint django
        run: uv sync --extra dev --no-install-project && uv run ruff check .

  # ─── Typecheck ─────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Typecheck django
        run: uv sync --extra dev --no-install-project && uv run mypy .

      - name: Typecheck core
        working-directory: core
        run: uv sync --extra dev && uv run mypy .

  # ─── Test (core) ───────────────────────────────────────────────────────────────
  test-core:
    name: Test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests
        working-directory: core
        run: uv sync --extra dev && uv run pytest -v

  # ─── Test (django) ─────────────────────────────────────────────────────────────
  test-django:
    name: Test (django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stripe_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stripe_saas_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests
        run: |
          uv sync --extra dev --no-install-project
          uv run pytest -v || {
            code=$?
            if [ $code -eq 5 ]; then echo "⚠ Skipped — no tests found yet"; exit 0; fi
            exit $code
          }

  # ─── Audit & dependency freshness ─────────────────────────────────────────────
  audit-and-deps:
    name: Audit & deps
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # ── Vulnerability audit ──
      - name: Audit vulnerabilities
        run: |
          for pair in "django:." "core:core"; do
            pkg="${pair%%:*}"
            dir="${pair#*:}"

            pushd "$dir" > /dev/null
            uv sync --extra dev --no-install-project 2>/dev/null || uv sync --extra dev

            uv run pip-audit --desc --skip-editable -f json -o /tmp/audit-raw-${pkg}.json || true
            python3 -c "
          import json, re
          with open('pyproject.toml') as f:
              text = f.read()
          direct = set()
          m = re.search(r'^dependencies\s*=\s*\[(.*?)\](?=\s*\n\s*\n|\s*\n\s*\[)', text, re.S | re.M)
          if m:
              for line in m.group(1).splitlines():
                  line = line.strip().strip(',').strip('\x22\x27')
                  if line and not line.startswith('#'):
                      name = re.split(r'[>=<!\[;]', line)[0].strip().lower()
                      if name:
                          direct.add(name)
          data = json.load(open('/tmp/audit-raw-${pkg}.json'))
          vulns = data.get('dependencies', [])
          rows = []
          for dep in vulns:
              for v in dep.get('vulns', []):
                  fix = v.get('fix_versions', [])
                  fix_str = ', '.join(fix) if fix else 'None'
                  dep_type = 'direct' if dep['name'].lower() in direct else 'transitive'
                  rows.append(f'| {dep[\"name\"]} | {dep[\"version\"]} | {dep_type} | {v[\"id\"]} | {fix_str} | {v.get(\"description\", \"\")[:120]} |')
          if rows:
              print('| Package | Version | Type | CVE | Fix | Description |')
              print('|---|---|---|---|---|---|')
              print('\n'.join(rows))
          else:
              print('no-vulns')
          " > /tmp/audit-report-${pkg}.txt
            popd > /dev/null
          done

      # ── Dependency freshness ──
      - name: Check outdated dependencies
        run: |
          for pair in "django:." "core:core"; do
            pkg="${pair%%:*}"
            dir="${pair#*:}"

            pushd "$dir" > /dev/null
            if [ ! -f uv.lock ]; then
              echo "up-to-date" > /tmp/deps-report-${pkg}.txt
              popd > /dev/null
              continue
            fi

            direct_deps=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              text = f.read()
          m = re.search(r'^dependencies\s*=\s*\[(.*?)\](?=\s*\n\s*\n|\s*\n\s*\[)', text, re.S | re.M)
          if m:
              for line in m.group(1).splitlines():
                  line = line.strip().strip(',').strip('\x22\x27')
                  if line and not line.startswith('#'):
                      name = re.split(r'[>=<!\[;]', line)[0].strip().lower()
                      if name:
                          print(name)
          ")

            extract() {
              awk '/^\[\[package\]\]/{p=1;name=""} p && /^name = /{name=$3} p && /^version = / && name{print name "=" $3; p=0}' "$1" | tr -d '"' | sort
            }
            extract uv.lock > /tmp/current-${pkg}.txt
            uv lock --upgrade -q
            extract uv.lock > /tmp/latest-${pkg}.txt

            join -t= /tmp/current-${pkg}.txt /tmp/latest-${pkg}.txt \
              | while IFS='=' read -r name cur latest; do
                  [ "$cur" = "$latest" ] && continue
                  if echo "$direct_deps" | grep -qx "$name"; then
                    type="direct"
                  else
                    type="transitive"
                  fi
                  printf '| %s | %s | %s | %s |\n' "$name" "$cur" "$latest" "$type"
                done \
              > /tmp/changed-${pkg}.txt || true

            if [ ! -s /tmp/changed-${pkg}.txt ]; then
              echo "up-to-date" > /tmp/deps-report-${pkg}.txt
            else
              {
                echo "| Package | Current | Latest | Type |"
                echo "|---|---|---|---|"
                head -40 /tmp/changed-${pkg}.txt
              } > /tmp/deps-report-${pkg}.txt
            fi
            popd > /dev/null
          done

      # ── Post PR comment ──
      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          comment=""

          # ── Vulnerability audit section ──
          audit_body=""
          has_vulns=false
          for pkg in django core; do
            report=$(cat /tmp/audit-report-${pkg}.txt)
            if echo "$report" | grep -q "^|"; then
              has_vulns=true
              audit_body="${audit_body}### ${pkg}\n\n${report}\n\n"
            fi
          done
          if [ "$has_vulns" = true ]; then
            comment="## ⚠️ Vulnerability Audit\n\n${audit_body}"
          else
            comment="## ✅ Vulnerability Audit\n\nNo known vulnerabilities found in any package.\n\n"
          fi

          # ── Outdated dependencies section ──
          deps_body=""
          has_updates=false
          for pkg in django core; do
            report=$(cat /tmp/deps-report-${pkg}.txt)
            if echo "$report" | grep -q "^|"; then
              has_updates=true
              deps_body="${deps_body}### ${pkg}\n\n${report}\n\n"
            fi
          done
          if [ "$has_updates" = true ]; then
            comment="${comment}## Outdated Dependencies\n\n${deps_body}> Run \`uv lock --upgrade\` to update.\n"
          else
            comment="${comment}## ✅ Dependencies\n\nAll dependencies are up to date.\n"
          fi

          # Delete previous bot comment on these topics
          gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Vulnerability Audit") or contains("Dependencies"))) | .id' \
            | xargs -I{} gh api -X DELETE "repos/${GH_REPO}/issues/comments/{}" 2>/dev/null || true
          printf "%b" "$comment" | gh pr comment "$PR_NUMBER" --body-file -
