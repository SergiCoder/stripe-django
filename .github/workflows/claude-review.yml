name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == github.repository_owner) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-opus-4-6 --max-turns 10 --allowedTools "Bash(git diff*),Bash(git log*),Bash(git show*),Read,Glob,Grep,mcp__github__*"
          prompt: |
            Review the changes in this pull request for code quality, correctness, and security.

            Focus on:
            - Security: authentication, authorization, injection vulnerabilities, secrets in code, exposed sensitive data
            - Django best practices: ORM usage, settings configuration, URL patterns, middleware, signals
            - Model and query performance: N+1 queries, missing indexes, inefficient querysets
            - Stripe integration: webhook signature verification, idempotency, error handling
            - Test coverage: missing tests for critical paths, edge cases, error scenarios

            Instructions:
            1. Analyze the diff to identify all findings.
            2. Submit a single GitHub pull request review using mcp__github__create_pull_request_review.
               - Use event "COMMENT" if there are only low/medium findings, or "REQUEST_CHANGES" for critical/high findings.
               - For each finding, add an inline comment on the specific file and line where the issue occurs.
               - Each inline comment should include the severity (CRITICAL/HIGH/MEDIUM/LOW), a short title, and a clear explanation.
            3. In the review body, post a summary table:

            | Profile | Critical | High | Medium | Low |
            |---|---|---|---|---|
            | Security | ... | ... | ... | ... |
            | Django | ... | ... | ... | ... |
            | Performance | ... | ... | ... | ... |
            | Stripe | ... | ... | ... | ... |
            | Testing | ... | ... | ... | ... |
            | **Total** | **X** | **X** | **X** | **X** |

            If there are no findings, approve the PR with event "APPROVE" and body "No issues found. Ready to merge."

            Do not auto-fix anything — report only.
