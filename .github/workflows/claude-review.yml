name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    outputs:
      no_issues: ${{ steps.post-review.outputs.no_issues }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        id: claude-review
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-opus-4-6 --max-turns 10
          direct_prompt: |
            Review the changes in this pull request.

            Focus on:
            - Security: authentication, authorization, injection vulnerabilities, secrets in code, exposed sensitive data
            - Django best practices: ORM usage, settings configuration, URL patterns, middleware, signals
            - Model and query performance: N+1 queries, missing indexes, inefficient querysets
            - Stripe integration: webhook signature verification, idempotency, error handling
            - Test coverage: missing tests for critical paths, edge cases, error scenarios

            Use this format:

            # Code Review

            **Files changed:** <count>

            ## Critical & High Findings
            <grouped by file, or "None">

            ## Medium Findings
            <grouped by file, or "None">

            ## Low Findings
            <grouped by file, or "None">

            ## Summary

            | Profile | Critical | High | Medium | Low |
            |---|---|---|---|---|
            | Security | ... | ... | ... | ... |
            | Django | ... | ... | ... | ... |
            | Performance | ... | ... | ... | ... |
            | Stripe | ... | ... | ... | ... |
            | Testing | ... | ... | ... | ... |
            | **Total** | **X** | **X** | **X** | **X** |

            If there are no findings, output exactly: "No issues found. Ready to merge."

            Do not auto-fix anything — report only.

      - name: Post review comment
        id: post-review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          LOG_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$LOG_FILE" ]; then
            echo "no_issues=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract assistant text messages from the execution log
          REVIEW=$(jq -r '
            [.[] | select(.type == "assistant" and .message != null)
                 | .message
                 | if type == "array" then
                     [.[] | select(.type == "text") | .text] | join("\n")
                   elif type == "string" then .
                   else empty
                   end
            ] | last // "Review produced no output."
          ' "$LOG_FILE")

          # Post as PR comment
          gh pr comment ${{ github.event.pull_request.number }} --body "$REVIEW"

          # Check if clean review
          if echo "$REVIEW" | grep -q "No issues found"; then
            echo "no_issues=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_issues=false" >> "$GITHUB_OUTPUT"
          fi

  auto-approve:
    needs: review
    if: >-
      github.event.pull_request.user.login == 'SergiCoder' &&
      needs.review.outputs.no_issues == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Approve PR
        run: gh pr review ${{ github.event.pull_request.number }} --approve --body "Claude review passed — auto-approved."
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
