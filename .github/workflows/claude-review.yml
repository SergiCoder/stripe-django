name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == github.repository_owner) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-opus-4-6 --max-turns 30 --allowedTools "Bash(git diff*),Bash(git log*),Bash(git show*),Bash(gh api*),Read,Glob,Grep,mcp__github__*,mcp__github_inline_comment__*"
          prompt: |
            Review the changes in this pull request for code quality, correctness, and security.

            Focus on:
            - Security: authentication, authorization, injection vulnerabilities, secrets in code, exposed sensitive data
            - Django best practices: ORM usage, settings configuration, URL patterns, middleware, signals
            - Model and query performance: N+1 queries, missing indexes, inefficient querysets
            - Stripe integration: webhook signature verification, idempotency, error handling
            - Test coverage: missing tests for critical paths, edge cases, error scenarios

            Instructions:
            1. First, fetch existing review comments to avoid duplicates:
               gh api repos/$REPO_OWNER/$REPO_NAME/pulls/$PR_NUMBER/comments \
                 --jq '.[] | select(.user.login == "github-actions[bot]" or .user.type == "Bot") | {path, line, body}'
               Keep this list to check against before posting new comments.
            2. Analyze the diff to identify all findings.
            3. For EACH finding, check if a comment already exists on the same file and line
               with the same issue title. If it does, SKIP it. Only post NEW findings using
               mcp__github_inline_comment__create_inline_comment with confirmed=true.
               IMPORTANT: You can only comment on lines that appear in the PR diff.
               If a finding relates to a line outside the diff, include it in the summary instead.
               Format each inline comment as:
               **<SEVERITY>** — <Category>: <Short title>
               <Explanation and recommendation>
            4. After posting all inline comments, update the main comment with a summary table:

            # Code Review

            **Files changed:** <count>
            **New inline comments:** <count>
            **Previously posted:** <count> (skipped)

            | Profile | Critical | High | Medium | Low |
            |---|---|---|---|---|
            | Security | ... | ... | ... | ... |
            | Django | ... | ... | ... | ... |
            | Performance | ... | ... | ... | ... |
            | Stripe | ... | ... | ... | ... |
            | Testing | ... | ... | ... | ... |
            | **Total** | **X** | **X** | **X** | **X** |

            If there are no findings, post: "No issues found. Ready to merge."

            Do not auto-fix anything — report only.
