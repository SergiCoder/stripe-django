name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'SergiCoder') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-opus-4-6 --max-turns 10 --allowedTools "Bash(git diff*),Bash(git log*),Bash(git show*),Read,Glob,Grep,mcp__github__*"
          prompt: |
            Review the changes in this pull request for code quality, correctness, and security.
            Analyze the diff, then post your findings as a single review comment on the PR.

            Focus on:
            - Security: authentication, authorization, injection vulnerabilities, secrets in code, exposed sensitive data
            - Django best practices: ORM usage, settings configuration, URL patterns, middleware, signals
            - Model and query performance: N+1 queries, missing indexes, inefficient querysets
            - Stripe integration: webhook signature verification, idempotency, error handling
            - Test coverage: missing tests for critical paths, edge cases, error scenarios

            Use this format for your review comment:

            # Code Review

            **Files changed:** <count>

            ## Critical & High Findings
            <grouped by file, or "None">

            ## Medium Findings
            <grouped by file, or "None">

            ## Low Findings
            <grouped by file, or "None">

            ## Summary

            | Profile | Critical | High | Medium | Low |
            |---|---|---|---|---|
            | Security | ... | ... | ... | ... |
            | Django | ... | ... | ... | ... |
            | Performance | ... | ... | ... | ... |
            | Stripe | ... | ... | ... | ... |
            | Testing | ... | ... | ... | ... |
            | **Total** | **X** | **X** | **X** | **X** |

            If there are no findings, post: "No issues found. Ready to merge."

            Do not auto-fix anything — report only.
