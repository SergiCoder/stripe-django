name: Deploy to dev VPS

on:
  push:
    tags:
      - "dev-v*"

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/saasmint/saasmint-core
            git fetch --tags
            git checkout ${{ github.ref_name }}
            docker compose -f infra/docker-compose.vps.yml build
            docker compose -f infra/docker-compose.vps.yml up -d
            sleep 5
            curl -sf http://127.0.0.1:8001/api/v1/health/ || { echo "Health check failed"; docker compose -f infra/docker-compose.vps.yml logs django --tail=50; exit 1; }
            echo "Deploy successful: ${{ github.ref_name }}"
