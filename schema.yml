openapi: 3.0.3
info:
  title: SaasMint Core API
  version: 1.0.0
  description: Django backend API for SaasMint — billing, accounts, and organizations.
paths:
  /api/v1/account/:
    get:
      operationId: account_retrieve
      description: GET /api/v1/account — return the current user's profile.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: account_partial_update
      description: PATCH /api/v1/account — update profile fields.
      tags:
      - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: account_destroy
      description: |-
        DELETE /api/v1/account — GDPR right to erasure.

        Immediately hard-deletes the user and all associated data.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/account/avatar/:
    post:
      operationId: account_avatar_create
      description: |-
        Upload avatar (multipart), return { avatar_url }.

        The uploaded image is decoded with Pillow, re-encoded as a 128x128 WebP,
        and stored. The original bytes and client-supplied filename/content_type
        are never written to storage — this blocks stored-XSS from polyglot or
        mis-typed uploads (e.g. ``foo.svg``/``foo.html`` claiming to be images).
      tags:
      - account
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/_AvatarUploadRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarResponse'
          description: ''
    delete:
      operationId: account_avatar_destroy
      description: Delete avatar.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/account/export/:
    get:
      operationId: account_export_retrieve
      description: GET /api/v1/account/export — GDPR right of access.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountExportResponse'
          description: ''
  /api/v1/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: POST /api/v1/auth/change-password — change password while authenticated.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      description: POST /api/v1/auth/forgot-password — send reset email (always 200).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: POST /api/v1/auth/login — authenticate with email + password.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: POST /api/v1/auth/logout — revoke refresh token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: POST /api/v1/auth/refresh — rotate refresh token and get new tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: POST /api/v1/auth/register — create a new account.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/register/org-owner/:
    post:
      operationId: auth_register_org_owner_create
      description: |-
        POST /api/v1/auth/register/org-owner — register as an org owner.

        Creates a user with account_type=ORG_MEMBER. No free plan is assigned;
        the user must complete team checkout to create an org and subscription.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/reset-password/:
    post:
      operationId: auth_reset_password_create
      description: POST /api/v1/auth/reset-password — validate token and set new password.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/verify-email/:
    post:
      operationId: auth_verify_email_create
      description: POST /api/v1/auth/verify-email — activate a user account.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/billing/checkout-sessions/:
    post:
      operationId: billing_checkout_sessions_create
      description: POST /api/v1/billing/checkout-sessions — create a Stripe Checkout
        Session.
      tags:
      - billing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CheckoutRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CheckoutRequestRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
          description: ''
  /api/v1/billing/plans/:
    get:
      operationId: billing_plans_retrieve
      description: 'List all active plans with prices. Returned as a non-paginated
        ``{results: [...]}`` envelope — the catalog is bounded to a small number of
        plans.'
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanListResponse'
          description: ''
  /api/v1/billing/portal-sessions/:
    post:
      operationId: billing_portal_sessions_create
      description: POST /api/v1/billing/portal-sessions — create a Stripe Customer
        Portal session.
      tags:
      - billing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PortalRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PortalRequestRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalResponse'
          description: ''
  /api/v1/billing/products/:
    get:
      operationId: billing_products_retrieve
      description: 'List all active one-time products with prices. Returned as a non-paginated
        ``{results: [...]}`` envelope — the catalog is bounded to a small number of
        products.'
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
          description: ''
  /api/v1/billing/subscriptions/me/:
    get:
      operationId: billing_subscriptions_me_retrieve
      description: GET/PATCH/DELETE /api/v1/billing/subscriptions/me/ — manage current
        subscription.
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          description: ''
    patch:
      operationId: billing_subscriptions_me_partial_update
      description: GET/PATCH/DELETE /api/v1/billing/subscriptions/me/ — manage current
        subscription.
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateSubscriptionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateSubscriptionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateSubscriptionRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          description: ''
    delete:
      operationId: billing_subscriptions_me_destroy
      description: GET/PATCH/DELETE /api/v1/billing/subscriptions/me/ — manage current
        subscription.
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          description: ''
  /api/v1/currencies/:
    get:
      operationId: currencies_retrieve
      description: GET /api/v1/currencies/ — list supported currencies.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
  /api/v1/invitations/{token}/:
    get:
      operationId: invitations_retrieve
      description: |-
        GET /api/v1/invitations/{token}/ — fetch invitation details by token.

        Unauthenticated endpoint. Returns invitation info including the
        organization name so the accept/decline page can display it.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/v1/invitations/{token}/accept/:
    post:
      operationId: invitations_accept_create
      description: |-
        POST /api/v1/invitations/{token}/accept/ — register and join an org.

        Unauthenticated endpoint. The invitee provides registration data
        (full_name, password) and is created as an org_member user.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationAcceptResponse'
          description: ''
  /api/v1/invitations/{token}/decline/:
    post:
      operationId: invitations_decline_create
      description: POST /api/v1/invitations/{token}/decline/ — decline an invitation.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/locales/:
    get:
      operationId: locales_retrieve
      description: GET /api/v1/locales/ — list supported locales.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
  /api/v1/orgs/:
    get:
      operationId: orgs_list
      description: GET /api/v1/orgs/ — list user's orgs.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Page size (max 100)
      - in: query
        name: offset
        schema:
          type: integer
        description: Number of items to skip
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Org'
          description: ''
  /api/v1/orgs/{org_id}/:
    get:
      operationId: orgs_retrieve
      description: GET/PATCH /api/v1/orgs/{org_id}/.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
          description: ''
    patch:
      operationId: orgs_partial_update
      description: GET/PATCH /api/v1/orgs/{org_id}/.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateOrgRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateOrgRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateOrgRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
          description: ''
  /api/v1/orgs/{org_id}/invitations/:
    get:
      operationId: orgs_invitations_list
      description: GET/POST /api/v1/orgs/{org_id}/invitations/ — list or create invitations.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Page size (max 100)
      - in: query
        name: offset
        schema:
          type: integer
        description: Number of items to skip
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
          description: ''
    post:
      operationId: orgs_invitations_create
      description: GET/POST /api/v1/orgs/{org_id}/invitations/ — list or create invitations.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/v1/orgs/{org_id}/invitations/{invitation_id}/:
    delete:
      operationId: orgs_invitations_destroy
      description: DELETE /api/v1/orgs/{org_id}/invitations/{invitation_id}/ — cancel
        invitation.
      parameters:
      - in: path
        name: invitation_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/orgs/{org_id}/members/:
    get:
      operationId: orgs_members_list
      description: GET /api/v1/orgs/{org_id}/members/ — list members.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Page size (max 100)
      - in: query
        name: offset
        schema:
          type: integer
        description: Number of items to skip
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrgMember'
          description: ''
  /api/v1/orgs/{org_id}/members/{member_user_id}/:
    patch:
      operationId: orgs_members_partial_update
      description: PATCH/DELETE /api/v1/orgs/{org_id}/members/{user_id}/.
      parameters:
      - in: path
        name: member_user_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMemberRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMemberRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMemberRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'
          description: ''
    delete:
      operationId: orgs_members_destroy
      description: Remove a member — decrements Stripe seats and hard-deletes their
        account.
      parameters:
      - in: path
        name: member_user_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/orgs/{org_id}/owner/:
    put:
      operationId: orgs_owner_update
      description: PUT /api/v1/orgs/{org_id}/owner/ — transfer ownership to another
        admin.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferOwnershipRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TransferOwnershipRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TransferOwnershipRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'
          description: ''
  /api/v1/phone-prefixes/:
    get:
      operationId: phone_prefixes_retrieve
      description: GET /api/v1/phone-prefixes/ — list supported phone prefixes.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: string
          description: ''
  /api/v1/timezones/:
    get:
      operationId: timezones_retrieve
      description: GET /api/v1/timezones/ — list IANA timezones.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
