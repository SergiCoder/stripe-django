openapi: 3.0.3
info:
  title: SaasMint Core API
  version: 1.0.0
  description: Django backend API for SaasMint — billing, accounts, and organisations.
paths:
  /api/v1/account/:
    get:
      operationId: account_retrieve
      description: GET /api/v1/account — return the current user's profile.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: account_partial_update
      description: PATCH /api/v1/account — update profile fields.
      tags:
      - account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateUserRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: account_destroy
      description: |-
        DELETE /api/v1/account — GDPR right to erasure.

        Returns 204 if the account was deleted immediately (no active subscription).
        Returns 200 with ``{"scheduled_deletion_at": "..."}`` if deletion is
        scheduled for the end of the current billing period.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '204':
          description: No response body
  /api/v1/account/avatar/:
    post:
      operationId: account_avatar_create
      description: Upload avatar (multipart), return { avatar_url }.
      tags:
      - account
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/_AvatarUploadRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
    delete:
      operationId: account_avatar_destroy
      description: Delete avatar.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/account/cancel-deletion/:
    post:
      operationId: account_cancel_deletion_create
      description: POST /api/v1/account/cancel-deletion — undo scheduled account deletion.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/account/export/:
    get:
      operationId: account_export_retrieve
      description: GET /api/v1/account/export — GDPR right of access.
      tags:
      - account
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: POST /api/v1/auth/change-password — change password while authenticated.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      description: POST /api/v1/auth/forgot-password — send reset email (always 200).
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: POST /api/v1/auth/login — authenticate with email + password.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: POST /api/v1/auth/logout — revoke refresh token.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: POST /api/v1/auth/refresh — rotate refresh token and get new tokens.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: POST /api/v1/auth/register — create a new account.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/reset-password/:
    post:
      operationId: auth_reset_password_create
      description: POST /api/v1/auth/reset-password — validate token and set new password.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/auth/verify-email/:
    post:
      operationId: auth_verify_email_create
      description: POST /api/v1/auth/verify-email — activate a user account.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
  /api/v1/billing/checkout-sessions/:
    post:
      operationId: billing_checkout_sessions_create
      description: POST /api/v1/billing/checkout-sessions — create a Stripe Checkout
        Session.
      tags:
      - billing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CheckoutRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CheckoutRequestRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
          description: ''
  /api/v1/billing/plans/:
    get:
      operationId: billing_plans_list
      description: List all active plans with prices. Not paginated — the catalog
        is bounded to a small number of plans.
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'
          description: ''
  /api/v1/billing/portal-sessions/:
    post:
      operationId: billing_portal_sessions_create
      description: POST /api/v1/billing/portal-sessions — create a Stripe Customer
        Portal session.
      tags:
      - billing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PortalRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PortalRequestRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalResponse'
          description: ''
  /api/v1/billing/products/:
    get:
      operationId: billing_products_list
      description: List all active one-time products with prices. Not paginated —
        the catalog is bounded to a small number of products.
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/billing/subscription/:
    get:
      operationId: billing_subscription_retrieve
      description: GET/PATCH/DELETE /api/v1/billing/subscription — manage the current
        subscription.
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: ISO 4217 currency code (e.g. 'eur'). Overrides user preference.
      tags:
      - billing
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          description: ''
    patch:
      operationId: billing_subscription_partial_update
      description: GET/PATCH/DELETE /api/v1/billing/subscription — manage the current
        subscription.
      tags:
      - billing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateSubscriptionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateSubscriptionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateSubscriptionRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
    delete:
      operationId: billing_subscription_destroy
      description: GET/PATCH/DELETE /api/v1/billing/subscription — manage the current
        subscription.
      tags:
      - billing
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/currencies/:
    get:
      operationId: currencies_retrieve
      description: GET /api/v1/currencies/ — list supported currencies.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
  /api/v1/locales/:
    get:
      operationId: locales_retrieve
      description: GET /api/v1/locales/ — list supported locales.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
  /api/v1/orgs/:
    get:
      operationId: orgs_list
      description: GET /api/v1/orgs/ — list user's orgs; POST — create a new org.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Page size (max 100)
      - in: query
        name: offset
        schema:
          type: integer
        description: Number of items to skip
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Org'
          description: ''
    post:
      operationId: orgs_create
      description: GET /api/v1/orgs/ — list user's orgs; POST — create a new org.
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateOrgRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateOrgRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
          description: ''
  /api/v1/orgs/{org_id}/:
    get:
      operationId: orgs_retrieve
      description: GET/PATCH/DELETE /api/v1/orgs/{org_id}/.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
          description: ''
    patch:
      operationId: orgs_partial_update
      description: GET/PATCH/DELETE /api/v1/orgs/{org_id}/.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateOrgRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateOrgRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateOrgRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
          description: ''
    delete:
      operationId: orgs_destroy
      description: GET/PATCH/DELETE /api/v1/orgs/{org_id}/.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/orgs/{org_id}/members/:
    get:
      operationId: orgs_members_list
      description: GET /api/v1/orgs/{org_id}/members/ — list members; POST — add member.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Page size (max 200)
      - in: query
        name: offset
        schema:
          type: integer
        description: Number of items to skip
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrgMember'
          description: ''
    post:
      operationId: orgs_members_create
      description: GET /api/v1/orgs/{org_id}/members/ — list members; POST — add member.
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
        required: true
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'
          description: ''
  /api/v1/orgs/{org_id}/members/{member_user_id}/:
    patch:
      operationId: orgs_members_partial_update
      description: PATCH/DELETE /api/v1/orgs/{org_id}/members/{user_id}/.
      parameters:
      - in: path
        name: member_user_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMemberRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMemberRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateMemberRequest'
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'
          description: ''
    delete:
      operationId: orgs_members_destroy
      description: PATCH/DELETE /api/v1/orgs/{org_id}/members/{user_id}/.
      parameters:
      - in: path
        name: member_user_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - orgs
      security:
      - JWT: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/phone-prefixes/:
    get:
      operationId: phone_prefixes_retrieve
      description: GET /api/v1/phone-prefixes/ — list supported phone prefixes.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: string
          description: ''
  /api/v1/timezones/:
    get:
      operationId: timezones_retrieve
      description: GET /api/v1/timezones/ — list IANA timezones.
      tags:
      - references
      security:
      - JWT: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: ''
components:
  schemas:
    AccountTypeEnum:
      enum:
      - personal
      - org_member
      type: string
      description: |-
        * `personal` - Personal
        * `org_member` - Org Member
    AddMemberRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: member
        is_billing:
          type: boolean
          default: false
      required:
      - user_id
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
          maxLength: 128
      required:
      - current_password
      - new_password
    CheckoutRequestRequest:
      type: object
      properties:
        plan_price_id:
          type: string
          format: uuid
        quantity:
          type: integer
          maximum: 10000
          minimum: 1
          default: 1
        success_url:
          type: string
          format: uri
          minLength: 1
        cancel_url:
          type: string
          format: uri
          minLength: 1
        trial_period_days:
          type: integer
          maximum: 90
          minimum: 1
          nullable: true
      required:
      - cancel_url
      - plan_price_id
      - success_url
    CheckoutResponse:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
      - url
    ContextEnum:
      enum:
      - personal
      - team
      type: string
      description: |-
        * `personal` - Personal
        * `team` - Team
    CreateOrgRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        slug:
          type: string
          minLength: 1
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        logo_url:
          type: string
          format: uri
          nullable: true
          minLength: 1
      required:
      - name
      - slug
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    IntervalEnum:
      enum:
      - month
      - year
      type: string
      description: |-
        * `month` - Monthly
        * `year` - Yearly
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
