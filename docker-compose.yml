services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stripe_saas}
      POSTGRES_USER: ${POSTGRES_USER:-stripe_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stripe_saas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stripe_saas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── TLS proxy ────────────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    ports:
      - "8443:8443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/certs:/certs:ro
    depends_on:
      - django

  # ─── Django ────────────────────────────────────────────────────────────────

  django:
    build:
      context: .
      dockerfile: infra/Dockerfile
    entrypoint: ["/app/entrypoint.dev.sh"]
    ports:
      - "8001:8001"
    env_file:
      - .env.django
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stripe_saas}:${POSTGRES_PASSWORD:-stripe_saas}@postgres:5432/${POSTGRES_DB:-stripe_saas}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./infra/entrypoint.dev.sh:/app/entrypoint.dev.sh:ro

  # ─── Celery worker ────────────────────────────────────────────────────────

  celery:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: uv run celery -A config.celery worker --loglevel=info
    env_file:
      - .env.django
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stripe_saas}:${POSTGRES_PASSWORD:-stripe_saas}@postgres:5432/${POSTGRES_DB:-stripe_saas}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
