services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saasmint}
      POSTGRES_USER: ${POSTGRES_USER:-saasmint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saasmint}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saasmint}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── TLS proxy ────────────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    ports:
      - "8443:8443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/certs:/certs:ro
    depends_on:
      - django

  # ─── Django ────────────────────────────────────────────────────────────────

  django:
    build:
      context: .
      dockerfile: infra/Dockerfile
    entrypoint: ["/app/infra/entrypoint.dev.sh"]
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saasmint}:${POSTGRES_PASSWORD:-saasmint}@postgres:5432/${POSTGRES_DB:-saasmint}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ─── Celery worker ────────────────────────────────────────────────────────

  celery:
    build:
      context: .
      dockerfile: infra/Dockerfile
    command: uv run celery -A config.celery worker --loglevel=info
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saasmint}:${POSTGRES_PASSWORD:-saasmint}@postgres:5432/${POSTGRES_DB:-saasmint}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ─── Stripe webhook forwarder ─────────────────────────────────────────────

  stripe-cli:
    image: stripe/stripe-cli:latest
    command:
      - listen
      - --forward-to
      - django:8001/api/v1/webhooks/stripe
      - --skip-verify
    volumes:
      # Not :ro — stripe-cli writes device metadata to config.toml on startup.
      # The host config is created by `stripe login` and pins a stable webhook
      # signing secret across runs, so STRIPE_WEBHOOK_SECRET in .env.local
      # only needs to be set once.
      - ${HOME}/.config/stripe:/root/.config/stripe
    depends_on:
      - django

volumes:
  postgres_data:
